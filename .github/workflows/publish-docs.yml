name: Build & deploy docs to GitHub pages

on:
  release:
    types: [created]
  workflow_dispatch:
  push:
    branches: ["master"]

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build the Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
    - uses: actions/checkout@v5
    # - name: Get tags required by setuptools_scm to generate version
    #   run: |
    #     git fetch --prune --unshallow
    #     git fetch --depth=1 origin +refs/tags/*:refs/tags/*
    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - name: Install
      run: |
        pip install -v -e '.[dev]'
    - name: Build the docs
      run: |
        cd docs
        make autodoc
        cd ../
    - name: Upload static files as artifact
      id: deployment
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/build/html/

  deploy:
    name: Deploy the docs to GitHub pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
