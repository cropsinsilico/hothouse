name: Upload Python Package

on:
  release:
    types: [created]
  # TODO: Disable this after initially confirmed working
  push:
    branches-ignore:
     - gh-pages

env:
  PYTHONVERSION_STD: "3.14"

jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHONVERSION_STD }}

      - name: Install pypa/build
        run: python -m pip install build
      - name: Build a binary wheel and a source tarball
        run: python -m build --sdist
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{matrix.arch}} for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, macos-15-intel]
        arch: [auto]
        # include:
        #   - os: ubuntu-latest
        #     arch: aarch64
        #   # - os: ubuntu-latest
        #   #   arch: ppc64le
        #   - os: macos-15-intel
        #     arch: arm64
      fail-fast: false

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHONVERSION_STD }}

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.4.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          CIBW_ENABLE: cpython-prerelease
          CIBW_ENVIRONMENT: "PIP_ONLY_BINARY=numpy"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-for-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  all_tests_passed:
    runs-on: ubuntu-latest
    name: All tests passed
    needs: [build_sdist, build_wheels]
    if: always()
    steps:
      - name: All tests ok
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Some tests failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

  upload_wheels:
    name: Upload wheels & sdist to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    # Upload only for release
    if: github.event_name == 'release'

    # Upload to PyPI on every tag starting with 'v'
    # if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: wheels-for-*
          merge-multiple: true
      - uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: sdist
          merge-multiple: true

      - name: Check downloaded artifacts
        run: ls dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
